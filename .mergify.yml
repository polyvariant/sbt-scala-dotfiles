pull_request_rules:
- name: merge scala-steward's PRs
  conditions:
  - author=scala-steward
  - or:
    - body~=labels:.*early-semver-patch
    - body~=labels:.*early-semver-minor
  - status-success=Test (ubuntu-22.04, 2.12, temurin@17)
  actions:
    merge: {}
- name: Label core PRs
  conditions:
  - files~=^core/
  actions:
    label:
      add:
      - core
      remove: []
- name: Label files PRs
  conditions:
  - files~=^files/
  actions:
    label:
      add:
      - files
      remove: []
- name: Label hocon PRs
  conditions:
  - files~=^hocon/
  actions:
    label:
      add:
      - hocon
      remove: []
- name: Label scalafix PRs
  conditions:
  - files~=^scalafix/
  actions:
    label:
      add:
      - scalafix
      remove: []
- name: Label scalafmt PRs
  conditions:
  - files~=^scalafmt/
  actions:
    label:
      add:
      - scalafmt
      remove: []
